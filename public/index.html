<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketBooking - Premium Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        
        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 3rem;
            text-align: center;
        }

        .container {
            display: flex;
            gap: 2rem;
            max-width: 1000px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.2);
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input, select {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
        
        option {
            background-color: #1e293b;
            color: #f1f5f9;
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 1rem;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        #result-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed var(--border);
            border-radius: 8px;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.9rem;
            color: #a7f3d0;
            min-height: 100px;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            max-height: 200px;
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .error-text { color: #f87171 !important; }
        .success-text { color: #34d399 !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--surface-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>

    <h1>Ticket Booking V2</h1>
    <p class="subtitle">Experience High-Concurrency Booking Simulation</p>

    <div class="container">
        <!-- Event Info Card -->
        <div class="card" id="events-card">
            <h2>Danh sách vé</h2>
            <div id="concert-list">
                <div style="text-align: center; color: var(--text-muted);"><div class="loader"></div> Loading...</div>
            </div>
        </div>

        <!-- Booking Form Card -->
        <div class="card">
            <h2>Quản lý đặt vé</h2>
            
            <div class="form-group">
                <label>Mã số KH</label>
                <input type="number" id="userId" value="1" min="1" required>
            </div>

            <div class="form-group">
                <label>Loại vé</label>
                <select id="categoryId"></select>
            </div>

            <div class="form-group">
                <label>Số lượng</label>
                <input type="number" id="quantity" value="2" min="1" required>
            </div>

            <div class="form-group">
                <label>Mã giảm giá(Tùy chọn)</label>
                <input type="text" id="voucherCode" placeholder="e.g. GIAM200K" value="GIAM200K">
            </div>

            <div class="form-group">
                <label>Mã giao dịch</label>
                <input type="text" id="idempotencyKey" readonly style="color: var(--text-muted); font-size: 0.8rem;">
            </div>

            <button id="book-btn" onclick="submitOrder()">Đặt vé</button>
            
            <h3 style="font-size: 1rem; margin-top: 1rem; color: var(--text-muted);">Phản hồi</h3>
            <div id="result-box">Đang chờ...</div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        // Generate a random idempotency key on load
        function generateIdempotencyKey() {
            return 'req-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now();
        }

        document.getElementById('idempotencyKey').value = generateIdempotencyKey();

        // Fetch concerts and categories
        async function fetchConcerts() {
            try {
                const res = await fetch(`${API_BASE}/concerts`);
                const concerts = await res.json();
                
                const listDiv = document.getElementById('concert-list');
                const categorySelect = document.getElementById('categoryId');
                
                listDiv.innerHTML = '';
                categorySelect.innerHTML = '';

                for (let concert of concerts) {
                    const cRes = await fetch(`${API_BASE}/concerts/${concert.id}`);
                    const cDetails = await cRes.json();
                    
                    // Render UI Info
                    const html = `
                        <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border: 1px solid var(--border);">
                            <h3 style="color: var(--primary);">${cDetails.title}</h3>
                            <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px;">${cDetails.location} - ${new Date(cDetails.eventDate).toLocaleDateString()}</p>
                            ${cDetails.categories.map(cat => `
                                <div style="display: flex; justify-content: space-between; font-size: 0.9rem; padding: 4px 0; border-top: 1px dashed var(--border);">
                                    <span>${cat.name} ($${cat.price})</span>
                                    <span style="color: ${cat.availableQuantity > 0 ? '#34d399' : '#f87171'}">${cat.availableQuantity}/${cat.totalQuantity} Vé</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    listDiv.innerHTML += html;

                    // Populate Select Options
                    cDetails.categories.forEach(cat => {
                        const opt = document.createElement('option');
                        opt.value = cat.id;
                        opt.textContent = `${concert.title} - ${cat.name} ($${cat.price})`;
                        if (cat.availableQuantity <= 0) opt.disabled = true;
                        categorySelect.appendChild(opt);
                    });
                }
            } catch (error) {
                document.getElementById('concert-list').innerHTML = '<p class="error-text">Failed to load concerts.</p>';
            }
        }

        async function submitOrder() {
            const btn = document.getElementById('book-btn');
            const resultBox = document.getElementById('result-box');
            
            const payload = {
                userId: parseInt(document.getElementById('userId').value),
                ticketCategoryId: parseInt(document.getElementById('categoryId').value),
                quantity: parseInt(document.getElementById('quantity').value),
                voucherCode: document.getElementById('voucherCode').value || undefined,
                idempotencyKey: document.getElementById('idempotencyKey').value
            };

            btn.disabled = true;
            btn.innerHTML = '<div class="loader"></div> Processing...';
            resultBox.innerHTML = 'Sending request...';
            resultBox.className = '';

            try {
                const res = await fetch(`${API_BASE}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                
                resultBox.innerHTML = JSON.stringify(data, null, 2);
                if (res.ok) {
                    resultBox.classList.add('success-text');
                    // Refresh idempotency key for next order
                    document.getElementById('idempotencyKey').value = generateIdempotencyKey();
                    // Refresh inventory
                    fetchConcerts();
                } else {
                    resultBox.classList.add('error-text');
                }
            } catch (error) {
                resultBox.innerHTML = `Error: ${error.message}`;
                resultBox.classList.add('error-text');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Confirm Booking';
            }
        }

        // Init
        fetchConcerts();
    </script>
</body>
</html>
